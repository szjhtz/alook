name: Publish CLI

on:
  push:
    branches: [main]
    paths: [src/cli/package.json]

concurrency:
  group: publish-cli
  cancel-in-progress: false

jobs:
  publish:
    name: Publish @alook/cli to npm
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Detect version
        id: version
        run: |
          VERSION=$(node -p "require('./src/cli/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=cli/v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if version already published
        id: check
        run: |
          if npm view "@alook/cli@${{ steps.version.outputs.version }}" version >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::@alook/cli@${{ steps.version.outputs.version }} already on npm — skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v6
        if: steps.check.outputs.skip == 'false'

      - uses: oven-sh/setup-bun@v2
        if: steps.check.outputs.skip == 'false'

      - uses: actions/setup-node@v6
        if: steps.check.outputs.skip == 'false'
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Upgrade npm for Trusted Publishers
        if: steps.check.outputs.skip == 'false'
        run: |
          npm install -g --prefix="$RUNNER_TEMP/npm-new" npm@latest
          echo "$RUNNER_TEMP/npm-new/bin" >> "$GITHUB_PATH"

      - run: pnpm install --frozen-lockfile
        if: steps.check.outputs.skip == 'false'

      - name: Build CLI bundle
        if: steps.check.outputs.skip == 'false'
        run: pnpm -C src/cli run build

      - name: Publish to npm (OIDC)
        if: steps.check.outputs.skip == 'false'
        working-directory: src/cli
        run: npm publish --access public

      - name: Create GitHub release
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ steps.version.outputs.tag }}" --generate-notes --title "CLI v${{ steps.version.outputs.version }}"
