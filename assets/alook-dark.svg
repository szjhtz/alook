<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Back block (shadow) — warm umber, softer than gray -->
  <rect x="4" y="6" width="18" height="18" rx="3" fill="#8a7a6c" opacity="0.42" />
  <!-- Front block — cream / warm paper, not pure white -->
  <rect x="6" y="8" width="18" height="18" rx="3" fill="#e8ddd0" />
  <!-- Envelope body — deep warm brown -->
  <rect x="9.5" y="13" width="11" height="9" rx="2" fill="#120e0a" />
  <!-- Flap — same as front block (card “bg”) -->
  <path d="M 10 13.5 Q 15 18.5 20 13.5" fill="none" stroke="#e8ddd0" stroke-width="1.4" stroke-linecap="round" />
</svg>