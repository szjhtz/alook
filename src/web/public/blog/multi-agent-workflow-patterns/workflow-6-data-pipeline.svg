<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Data Pipeline Crew Diagram - Funnel Pattern -->
  <defs>
    <linearGradient id="goldGrad6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#CD9200;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B08000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="funnelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#EDE7DD;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#CD9200;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#0F0A07;stop-opacity:0.1" />
    </linearGradient>
    <filter id="shadow6" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="#FEFDFB"/>

  <!-- Title -->
  <text x="600" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#0F0A07">Data Pipeline Crew</text>
  <text x="600" y="65" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#666">Many sources, unified output</text>

  <!-- Funnel Visualization -->
  <path d="M 200 150 L 1000 150 L 750 350 L 450 350 Z" fill="url(#funnelGrad)" opacity="0.5"/>
  <path d="M 450 350 L 450 450 L 750 450 L 750 350 Z" fill="url(#funnelGrad)" opacity="0.3"/>

  <!-- Multiple Scraper Agents (Top - Parallel) -->
  <rect x="220" y="100" width="140" height="70" rx="8" fill="url(#goldGrad6)" filter="url(#shadow6)"/>
  <text x="290" y="130" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Scraper</text>
  <text x="290" y="148" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Agent 1</text>
  <circle cx="245" cy="115" r="5" fill="white" opacity="0.8"/>
  <circle cx="255" cy="115" r="5" fill="white" opacity="0.8"/>
  <circle cx="265" cy="115" r="5" fill="white" opacity="0.8"/>

  <rect x="400" y="100" width="140" height="70" rx="8" fill="url(#goldGrad6)" filter="url(#shadow6)"/>
  <text x="470" y="130" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Scraper</text>
  <text x="470" y="148" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Agent 2</text>
  <circle cx="425" cy="115" r="5" fill="white" opacity="0.8"/>
  <circle cx="435" cy="115" r="5" fill="white" opacity="0.8"/>
  <circle cx="445" cy="115" r="5" fill="white" opacity="0.8"/>

  <rect x="580" y="100" width="140" height="70" rx="8" fill="url(#goldGrad6)" filter="url(#shadow6)"/>
  <text x="650" y="130" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Scraper</text>
  <text x="650" y="148" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Agent 3</text>
  <circle cx="605" cy="115" r="5" fill="white" opacity="0.8"/>
  <circle cx="615" cy="115" r="5" fill="white" opacity="0.8"/>
  <circle cx="625" cy="115" r="5" fill="white" opacity="0.8"/>

  <rect x="760" y="100" width="140" height="70" rx="8" fill="url(#goldGrad6)" filter="url(#shadow6)"/>
  <text x="830" y="130" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Scraper</text>
  <text x="830" y="148" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Agent N</text>
  <circle cx="785" cy="115" r="5" fill="white" opacity="0.8"/>
  <circle cx="795" cy="115" r="5" fill="white" opacity="0.8"/>
  <circle cx="805" cy="115" r="5" fill="white" opacity="0.8"/>

  <!-- Data Flow Lines from Scrapers -->
  <path d="M 290 170 L 500 250" stroke="#CD9200" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M 470 170 L 520 250" stroke="#CD9200" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M 650 170 L 580 250" stroke="#CD9200" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M 830 170 L 600 250" stroke="#CD9200" stroke-width="2" fill="none" opacity="0.6"/>

  <!-- Cleaner Agent (Middle) -->
  <rect x="470" y="230" width="160" height="80" rx="10" fill="url(#goldGrad6)" filter="url(#shadow6)"/>
  <text x="550" y="265" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Cleaner</text>
  <text x="550" y="285" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Agent</text>
  <path d="M 495 255 L 505 265 L 495 275" stroke="white" stroke-width="2" fill="none"/>
  <path d="M 510 255 L 520 265 L 510 275" stroke="white" stroke-width="2" fill="none"/>

  <!-- Arrow to Analyzer -->
  <path d="M 550 310 L 550 350" stroke="#CD9200" stroke-width="3" fill="none"/>
  <polygon points="545,350 550,360 555,350" fill="#CD9200"/>

  <!-- Analyzer Agent (Lower Middle) -->
  <rect x="470" y="360" width="160" height="80" rx="10" fill="url(#goldGrad6)" filter="url(#shadow6)"/>
  <text x="550" y="395" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Analyzer</text>
  <text x="550" y="415" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Agent</text>
  <circle cx="495" cy="390" r="8" fill="white" opacity="0.8"/>
  <path d="M 490 390 L 500 390 M 495 385 L 495 395" stroke="#CD9200" stroke-width="2"/>
  <path d="M 488 387 L 488 393" stroke="#CD9200" stroke-width="1.5"/>

  <!-- Parallel Output Agents -->
  <!-- Report Agent -->
  <rect x="340" y="490" width="160" height="80" rx="10" fill="url(#goldGrad6)" filter="url(#shadow6)"/>
  <text x="420" y="525" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Report</text>
  <text x="420" y="545" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Agent</text>
  <rect x="365" y="505" width="30" height="20" fill="white" opacity="0.8"/>
  <path d="M 370 510 L 390 510 M 370 515 L 385 515 M 370 520 L 380 520" stroke="#CD9200" stroke-width="1.5"/>

  <!-- Alert Agent -->
  <rect x="620" y="490" width="160" height="80" rx="10" fill="url(#goldGrad6)" filter="url(#shadow6)"/>
  <text x="700" y="525" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Alert</text>
  <text x="700" y="545" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Agent</text>
  <path d="M 690 505 L 710 505 L 700 520 Z" fill="white" opacity="0.8"/>
  <text x="700" y="515" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#CD9200">!</text>

  <!-- Arrows to Output Agents -->
  <path d="M 500 440 L 450 480" stroke="#CD9200" stroke-width="3" fill="none"/>
  <polygon points="445,475 445,485 455,480" fill="#CD9200"/>

  <path d="M 600 440 L 650 480" stroke="#CD9200" stroke-width="3" fill="none"/>
  <polygon points="645,475 655,485 655,475" fill="#CD9200"/>

  <!-- Data Source Labels -->
  <text x="290" y="85" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">API</text>
  <text x="470" y="85" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">Web</text>
  <text x="650" y="85" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">Database</text>
  <text x="830" y="85" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">Files</text>

  <!-- Process Stage Labels -->
  <text x="950" y="140" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">COLLECT</text>
  <text x="950" y="270" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">CLEAN</text>
  <text x="950" y="400" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">ANALYZE</text>
  <text x="950" y="530" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">OUTPUT</text>

  <!-- Data Flow Indicators -->
  <circle cx="550" cy="190" r="3" fill="#CD9200" opacity="0.5"/>
  <circle cx="540" cy="200" r="3" fill="#CD9200" opacity="0.5"/>
  <circle cx="560" cy="200" r="3" fill="#CD9200" opacity="0.5"/>
  <circle cx="530" cy="210" r="3" fill="#CD9200" opacity="0.5"/>
  <circle cx="550" cy="210" r="3" fill="#CD9200" opacity="0.5"/>
  <circle cx="570" cy="210" r="3" fill="#CD9200" opacity="0.5"/>

  <!-- Key message -->
  <text x="600" y="590" font-family="Arial, sans-serif" font-size="12" font-style="italic" text-anchor="middle" fill="#999">Funnel architecture transforms diverse data into actionable insights</text>
</svg>
