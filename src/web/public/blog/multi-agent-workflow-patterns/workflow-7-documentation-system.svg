<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Documentation System Diagram - Tree Structure -->
  <defs>
    <linearGradient id="goldGrad7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#CD9200;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B08000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="treeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0F0A07;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#CD9200;stop-opacity:0.3" />
    </linearGradient>
    <filter id="shadow7" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="#FEFDFB"/>

  <!-- Title -->
  <text x="600" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#0F0A07">Documentation System</text>
  <text x="600" y="65" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#666">Comprehensive coverage from single source</text>

  <!-- Code Scanner (Root) -->
  <rect x="520" y="100" width="160" height="80" rx="10" fill="#0F0A07" filter="url(#shadow7)"/>
  <text x="600" y="135" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Code</text>
  <text x="600" y="155" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Scanner</text>
  <path d="M 560 120 L 640 120 M 560 125 L 640 125 M 560 130 L 640 130" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <circle cx="550" cy="125" r="3" fill="#CD9200"/>

  <!-- Tree Branches -->
  <!-- Main trunk -->
  <path d="M 600 180 L 600 250" stroke="#CD9200" stroke-width="3" fill="none"/>

  <!-- Branches to agents -->
  <path d="M 600 250 L 350 350" stroke="#CD9200" stroke-width="2" fill="none"/>
  <path d="M 600 250 L 500 350" stroke="#CD9200" stroke-width="2" fill="none"/>
  <path d="M 600 250 L 700 350" stroke="#CD9200" stroke-width="2" fill="none"/>
  <path d="M 600 250 L 850 350" stroke="#CD9200" stroke-width="2" fill="none"/>

  <!-- Branch nodes -->
  <circle cx="600" cy="250" r="8" fill="#CD9200" stroke="white" stroke-width="2"/>

  <!-- Agent Leaves -->
  <!-- API Agent -->
  <rect x="270" y="350" width="140" height="70" rx="8" fill="url(#goldGrad7)" filter="url(#shadow7)"/>
  <text x="340" y="380" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">API</text>
  <text x="340" y="398" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Agent</text>
  <path d="M 295 365 L 315 365 M 295 370 L 310 370 M 295 375 L 305 375" stroke="white" stroke-width="1.5" opacity="0.8"/>

  <!-- Example Agent -->
  <rect x="430" y="350" width="140" height="70" rx="8" fill="url(#goldGrad7)" filter="url(#shadow7)"/>
  <text x="500" y="380" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Example</text>
  <text x="500" y="398" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Agent</text>
  <rect x="455" y="365" width="20" height="15" rx="2" fill="white" opacity="0.8"/>
  <path d="M 458 368 L 472 368 M 458 371 L 468 371 M 458 374 L 465 374" stroke="#CD9200" stroke-width="1"/>

  <!-- Changelog Agent -->
  <rect x="630" y="350" width="140" height="70" rx="8" fill="url(#goldGrad7)" filter="url(#shadow7)"/>
  <text x="700" y="380" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Changelog</text>
  <text x="700" y="398" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Agent</text>
  <circle cx="655" cy="375" r="6" fill="white" opacity="0.8"/>
  <path d="M 655 369 L 655 381 M 652 378 L 658 378" stroke="#CD9200" stroke-width="1.5"/>

  <!-- Tutorial Agent -->
  <rect x="790" y="350" width="140" height="70" rx="8" fill="url(#goldGrad7)" filter="url(#shadow7)"/>
  <text x="860" y="380" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Tutorial</text>
  <text x="860" y="398" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Agent</text>
  <path d="M 815 365 L 825 365 L 825 375 L 815 375 Z" fill="white" opacity="0.8"/>
  <path d="M 817 368 L 823 368 M 817 371 L 823 371" stroke="#CD9200" stroke-width="1"/>

  <!-- Convergence lines to Documentation -->
  <path d="M 340 420 L 520 490" stroke="#CD9200" stroke-width="2" fill="none"/>
  <path d="M 500 420 L 550 490" stroke="#CD9200" stroke-width="2" fill="none"/>
  <path d="M 700 420 L 650 490" stroke="#CD9200" stroke-width="2" fill="none"/>
  <path d="M 860 420 L 680 490" stroke="#CD9200" stroke-width="2" fill="none"/>

  <!-- Final Documentation (Fruit) -->
  <rect x="520" y="490" width="160" height="80" rx="10" fill="url(#treeGrad)" filter="url(#shadow7)"/>
  <text x="600" y="525" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">Complete</text>
  <text x="600" y="545" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">Documentation</text>
  <circle cx="550" cy="510" r="8" fill="#CD9200" opacity="0.8"/>
  <circle cx="650" cy="510" r="8" fill="#CD9200" opacity="0.8"/>
  <circle cx="570" cy="520" r="8" fill="#CD9200" opacity="0.8"/>
  <circle cx="630" cy="520" r="8" fill="#CD9200" opacity="0.8"/>

  <!-- Output Types -->
  <text x="340" y="445" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">API Specs</text>
  <text x="500" y="445" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">Code Samples</text>
  <text x="700" y="445" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">Version History</text>
  <text x="860" y="445" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">Guides</text>

  <!-- Process Flow Indicators -->
  <text x="120" y="140" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">1. SCAN</text>
  <path d="M 160 135 L 510 135" stroke="#666" stroke-width="1" stroke-dasharray="3,2" fill="none" opacity="0.3"/>

  <text x="120" y="250" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">2. ANALYZE</text>
  <path d="M 170 245 L 590 245" stroke="#666" stroke-width="1" stroke-dasharray="3,2" fill="none" opacity="0.3"/>

  <text x="120" y="385" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">3. GENERATE</text>
  <path d="M 180 380 L 260 380" stroke="#666" stroke-width="1" stroke-dasharray="3,2" fill="none" opacity="0.3"/>

  <text x="120" y="530" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">4. COMPILE</text>
  <path d="M 175 525 L 510 525" stroke="#666" stroke-width="1" stroke-dasharray="3,2" fill="none" opacity="0.3"/>

  <!-- Tree decoration (leaves) -->
  <circle cx="580" cy="230" r="3" fill="#CD9200" opacity="0.3"/>
  <circle cx="620" cy="230" r="3" fill="#CD9200" opacity="0.3"/>
  <circle cx="590" cy="260" r="3" fill="#CD9200" opacity="0.3"/>
  <circle cx="610" cy="260" r="3" fill="#CD9200" opacity="0.3"/>

  <!-- Key message -->
  <text x="600" y="590" font-family="Arial, sans-serif" font-size="12" font-style="italic" text-anchor="middle" fill="#999">Single source of truth branches into comprehensive documentation</text>
</svg>
