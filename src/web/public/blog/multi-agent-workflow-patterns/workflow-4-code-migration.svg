<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Code Migration Factory Diagram -->
  <defs>
    <linearGradient id="goldGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#CD9200;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B08000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="parallelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#EDE7DD;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#CD9200;stop-opacity:0.1" />
    </linearGradient>
    <filter id="shadow4" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="#FEFDFB"/>

  <!-- Title -->
  <text x="600" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#0F0A07">Code Migration Factory</text>
  <text x="600" y="65" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#666">Bulk processing in parallel</text>

  <!-- Legacy Analyzer -->
  <rect x="50" y="250" width="160" height="100" rx="10" fill="#0F0A07" filter="url(#shadow4)"/>
  <text x="130" y="290" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Legacy</text>
  <text x="130" y="310" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Analyzer</text>

  <!-- Arrow to Migration Planner -->
  <path d="M 210 300 L 270 300" stroke="#CD9200" stroke-width="3" fill="none"/>
  <polygon points="270,295 280,300 270,305" fill="#CD9200"/>

  <!-- Migration Planner -->
  <rect x="280" y="250" width="160" height="100" rx="10" fill="url(#goldGrad4)" filter="url(#shadow4)"/>
  <text x="360" y="290" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Migration</text>
  <text x="360" y="310" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Planner</text>

  <!-- Parallel Processing Area -->
  <rect x="500" y="120" width="280" height="360" rx="15" fill="url(#parallelGrad)" stroke="#CD9200" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="640" y="105" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#666">PARALLEL PROCESSING</text>

  <!-- Arrows to Parallel Converters -->
  <path d="M 440 300 L 490 230" stroke="#CD9200" stroke-width="2" fill="none"/>
  <polygon points="485,230 495,225 490,235" fill="#CD9200"/>

  <path d="M 440 300 L 490 300" stroke="#CD9200" stroke-width="2" fill="none"/>
  <polygon points="490,295 500,300 490,305" fill="#CD9200"/>

  <path d="M 440 300 L 490 370" stroke="#CD9200" stroke-width="2" fill="none"/>
  <polygon points="485,365 495,375 490,370" fill="#CD9200"/>

  <!-- Converter Agents (Parallel) -->
  <rect x="520" y="160" width="140" height="80" rx="8" fill="url(#goldGrad4)" filter="url(#shadow4)"/>
  <text x="590" y="195" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Converter</text>
  <text x="590" y="212" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Agent 1</text>

  <rect x="520" y="260" width="140" height="80" rx="8" fill="url(#goldGrad4)" filter="url(#shadow4)"/>
  <text x="590" y="295" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Converter</text>
  <text x="590" y="312" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Agent 2</text>

  <rect x="520" y="360" width="140" height="80" rx="8" fill="url(#goldGrad4)" filter="url(#shadow4)"/>
  <text x="590" y="395" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Converter</text>
  <text x="590" y="412" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Agent N</text>

  <!-- Dots indicating more agents -->
  <circle cx="700" cy="200" r="3" fill="#CD9200"/>
  <circle cx="710" cy="200" r="3" fill="#CD9200"/>
  <circle cx="720" cy="200" r="3" fill="#CD9200"/>

  <circle cx="700" cy="300" r="3" fill="#CD9200"/>
  <circle cx="710" cy="300" r="3" fill="#CD9200"/>
  <circle cx="720" cy="300" r="3" fill="#CD9200"/>

  <circle cx="700" cy="400" r="3" fill="#CD9200"/>
  <circle cx="710" cy="400" r="3" fill="#CD9200"/>
  <circle cx="720" cy="400" r="3" fill="#CD9200"/>

  <!-- Arrows from Converters to Validation -->
  <path d="M 780 200 L 830 270" stroke="#CD9200" stroke-width="2" fill="none"/>
  <polygon points="825,270 835,275 830,265" fill="#CD9200"/>

  <path d="M 780 300 L 830 300" stroke="#CD9200" stroke-width="2" fill="none"/>
  <polygon points="830,295 840,300 830,305" fill="#CD9200"/>

  <path d="M 780 400 L 830 330" stroke="#CD9200" stroke-width="2" fill="none"/>
  <polygon points="825,335 835,325 830,330" fill="#CD9200"/>

  <!-- Validation Agent -->
  <rect x="840" y="250" width="160" height="100" rx="10" fill="url(#goldGrad4)" filter="url(#shadow4)"/>
  <text x="920" y="290" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Validation</text>
  <text x="920" y="310" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Agent</text>

  <!-- Arrow to Integration -->
  <path d="M 1000 300 L 1040 300" stroke="#CD9200" stroke-width="3" fill="none"/>
  <polygon points="1040,295 1050,300 1040,305" fill="#CD9200"/>

  <!-- Integration Agent -->
  <rect x="1050" y="250" width="130" height="100" rx="10" fill="#0F0A07" filter="url(#shadow4)"/>
  <text x="1115" y="290" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Integration</text>
  <text x="1115" y="310" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Agent</text>

  <!-- Process Labels -->
  <text x="130" y="375" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">Scan</text>
  <text x="130" y="390" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#999">Legacy Code</text>

  <text x="360" y="375" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">Strategy</text>
  <text x="360" y="390" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#999">Divide Work</text>

  <text x="640" y="500" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">Convert</text>
  <text x="640" y="515" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#999">Multiple Files</text>

  <text x="920" y="375" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">Test</text>
  <text x="920" y="390" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#999">All Outputs</text>

  <text x="1115" y="375" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#666">Merge</text>
  <text x="1115" y="390" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#999">Final Code</text>

  <!-- Performance indicator -->
  <rect x="520" y="140" width="240" height="3" fill="#CD9200" opacity="0.3"/>
  <rect x="520" y="140" width="180" height="3" fill="#CD9200">
    <animate attributeName="width" from="0" to="240" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Key message -->
  <text x="600" y="560" font-family="Arial, sans-serif" font-size="12" font-style="italic" text-anchor="middle" fill="#999">Parallel converters handle bulk migration efficiently</text>
</svg>
