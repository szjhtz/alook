<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="500" viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Content Production Line Diagram -->
  <defs>
    <linearGradient id="goldGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#CD9200;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B08000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="conveyorGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#EDE7DD;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#CD9200;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#EDE7DD;stop-opacity:0.3" />
    </linearGradient>
    <filter id="shadow3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="500" fill="#FEFDFB"/>

  <!-- Title -->
  <text x="600" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#0F0A07">Content Production Line</text>
  <text x="600" y="65" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#666">Each step adds value to the final content</text>

  <!-- Conveyor Belt Visualization -->
  <rect x="30" y="280" width="1140" height="60" rx="30" fill="url(#conveyorGrad)" opacity="0.5"/>
  <path d="M 60 310 L 1140 310" stroke="#CD9200" stroke-width="2" stroke-dasharray="10,5" fill="none" opacity="0.4"/>

  <!-- Station Platforms -->
  <rect x="70" y="270" width="180" height="10" fill="#0F0A07" opacity="0.3"/>
  <rect x="290" y="270" width="180" height="10" fill="#0F0A07" opacity="0.3"/>
  <rect x="510" y="270" width="180" height="10" fill="#0F0A07" opacity="0.3"/>
  <rect x="730" y="270" width="180" height="10" fill="#0F0A07" opacity="0.3"/>
  <rect x="950" y="270" width="180" height="10" fill="#0F0A07" opacity="0.3"/>

  <!-- Agent Stations -->
  <!-- Research Agent -->
  <rect x="70" y="150" width="180" height="100" rx="10" fill="url(#goldGradient3)" filter="url(#shadow3)"/>
  <text x="160" y="195" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">Research</text>
  <text x="160" y="215" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">Agent</text>
  <circle cx="100" cy="175" r="8" fill="white" opacity="0.8"/>
  <path d="M 97 175 L 103 175 M 100 172 L 100 178" stroke="#CD9200" stroke-width="2"/>

  <!-- Writing Agent -->
  <rect x="290" y="150" width="180" height="100" rx="10" fill="url(#goldGradient3)" filter="url(#shadow3)"/>
  <text x="380" y="195" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">Writing</text>
  <text x="380" y="215" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">Agent</text>
  <circle cx="320" cy="175" r="8" fill="white" opacity="0.8"/>
  <path d="M 315 175 L 325 175" stroke="#CD9200" stroke-width="2"/>
  <path d="M 317 173 L 323 173" stroke="#CD9200" stroke-width="1.5"/>
  <path d="M 319 177 L 321 177" stroke="#CD9200" stroke-width="1.5"/>

  <!-- Fact-Check Agent -->
  <rect x="510" y="150" width="180" height="100" rx="10" fill="url(#goldGradient3)" filter="url(#shadow3)"/>
  <text x="600" y="195" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">Fact-Check</text>
  <text x="600" y="215" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">Agent</text>
  <circle cx="540" cy="175" r="8" fill="white" opacity="0.8"/>
  <path d="M 536 175 L 538 177 L 544 171" stroke="#CD9200" stroke-width="2" fill="none"/>

  <!-- SEO Agent -->
  <rect x="730" y="150" width="180" height="100" rx="10" fill="url(#goldGradient3)" filter="url(#shadow3)"/>
  <text x="820" y="195" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">SEO</text>
  <text x="820" y="215" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">Agent</text>
  <circle cx="760" cy="175" r="8" fill="white" opacity="0.8"/>
  <path d="M 760 167 L 760 183 M 752 175 L 768 175" stroke="#CD9200" stroke-width="1.5"/>
  <circle cx="760" cy="175" r="6" fill="none" stroke="#CD9200" stroke-width="1.5"/>

  <!-- Publishing Agent -->
  <rect x="950" y="150" width="180" height="100" rx="10" fill="url(#goldGradient3)" filter="url(#shadow3)"/>
  <text x="1040" y="195" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">Publishing</text>
  <text x="1040" y="215" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">Agent</text>
  <circle cx="980" cy="175" r="8" fill="white" opacity="0.8"/>
  <path d="M 975 175 L 985 175 M 980 170 L 980 180 M 975 170 L 985 170" stroke="#CD9200" stroke-width="2"/>

  <!-- Flow Arrows (above conveyor) -->
  <path d="M 250 200 L 280 200" stroke="white" stroke-width="3" fill="none"/>
  <polygon points="280,195 290,200 280,205" fill="white"/>

  <path d="M 470 200 L 500 200" stroke="white" stroke-width="3" fill="none"/>
  <polygon points="500,195 510,200 500,205" fill="white"/>

  <path d="M 690 200 L 720 200" stroke="white" stroke-width="3" fill="none"/>
  <polygon points="720,195 730,200 720,205" fill="white"/>

  <path d="M 910 200 L 940 200" stroke="white" stroke-width="3" fill="none"/>
  <polygon points="940,195 950,200 940,205" fill="white"/>

  <!-- Process descriptions -->
  <text x="160" y="380" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#666">Gather Data</text>
  <text x="160" y="395" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#999">Sources & Facts</text>

  <text x="380" y="380" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#666">Create Draft</text>
  <text x="380" y="395" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#999">Structure & Flow</text>

  <text x="600" y="380" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#666">Verify</text>
  <text x="600" y="395" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#999">Accuracy Check</text>

  <text x="820" y="380" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#666">Optimize</text>
  <text x="820" y="395" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#999">Keywords & Meta</text>

  <text x="1040" y="380" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#666">Deploy</text>
  <text x="1040" y="395" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#999">Live Content</text>

  <!-- Value addition indicator -->
  <path d="M 80 430 L 1120 430" stroke="#CD9200" stroke-width="2" fill="none" opacity="0.3"/>
  <polygon points="1120,425 1130,430 1120,435" fill="#CD9200" opacity="0.3"/>
  <text x="600" y="455" font-family="Arial, sans-serif" font-size="12" font-style="italic" text-anchor="middle" fill="#999">Assembly line approach ensures consistent quality output</text>
</svg>
